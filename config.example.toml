# openai-mcp configuration
# Copy to config.toml and fill in your values.

[api]
# Any OpenAI-compatible API endpoint
base_url = "http://localhost:3001/v1"
api_key  = "your-api-key-here"

[server]
host = "0.0.0.0"
port = 9000

[models]
# Model to use for the `chat` tool (required)
chat = "gpt-4o"

# Model for the `research` tool — enables deep web search + synthesis.
# Comment out to disable the research tool.
research = "research"

# Model for the `image_gen` tool — enables image generation.
# Comment out to disable the image tool.
image = "gpt-image-2"
